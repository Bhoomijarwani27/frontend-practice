<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body class=" h-screen text-white">
    <!-- in media query it  used break point like lg,sm, for different screen sizes -->
     <!-- lg for large screens -->
<div class="bg-black h-full lg:bg-pink-300">
    <p> hello </p>
</div>
<!-- small screens -->
<div class="bg-black h-full sm:bg-pink-300">
    <p> hello </p>
</div>
<!-- md for medium screens -->
<div class="bg-black h-full md:bg-pink-300">
    <p> hello </p>
</div>  
<!-- extra-large screens -->
<div class="bg-black h-full xl:bg-pink-300">
    <p> hello </p>
    </div>  
    <!-- extra-extra-large screens -->
    <div class="bg-black h-full 2xl:bg-pink-300">
        <p> hello </p>
    </div>
 
</body>
</html>
