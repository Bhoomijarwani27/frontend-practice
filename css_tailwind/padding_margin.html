<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    <!-- Tailwind CSS padding and margin examples -->
    <p class="text-black bg-amber-300 p-4 m-4">Hello World</p>
<!-- padding only  -->
<p class="text-black bg-amber-300 p-4 ">Hello World</p>
 <!-- margin only -->
<p class="text-black bg-amber-300 m-4">Hello World</p>
<!-- no padding or margin -->
<p class="text-black bg-amber-300">Hello World</p>
<br>
<!-- padding on the left and right only -->
<p class="text-black bg-amber-300 px-4">Hello World</p>
<br>
<!-- margin on the left and right only -->
<p class="text-black bg-amber-300 mx-4">Hello World</p>
<br>
<!-- padding on the top and bottom only -->
<p class="text-black bg-amber-300 py-4">Hello World</p>
<br>
<!-- margin on the top and bottom only -->
<p class="text-black bg-amber-300 my-4">Hello World</p>
<br>
<!-- padding on the left only -->   
<p class="text-black bg-amber-300 pl-4">Hello World</p>
<br>
<!-- margin on the left only -->
<p class="text-black bg-amber-300 ml-4">Hello World</p>`
<br>
<!-- padding on the right only -->
<p class="text-black bg-amber-300 pr-4">Hello World</p>
<br>
<!-- margin on the right only -->
<p class="text-black bg-amber-300 mr-4">Hello World</p>
<br>
<!-- padding on the top only -->
<p class="text-black bg-amber-300 pt-4">Hello World</p>
<br>
<!-- margin on the top only -->
<p class="text-black bg-amber-300 mt-4">Hello World</p>
<br>
<!-- padding on the bottom only -->
<p class="text-black bg-amber-300 pb-4">Hello World</p>
<br>
<!-- margin on the bottom only -->
<p class="text-black bg-amber-300 mb-4">Hello World</p>
<br>
<!-- padding on the left and right only with different values -->   
<p class="text-black bg-amber-300 px-4 py-2">Hello World</p>
<br>
<!-- margin on the left and right only with different values -->
<p class="text-black bg-amber-300 mx-4 my-2">Hello World</p>




    
</body>
</html>
