<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    <button class="bg-blue-500 text-white px-4 py-2 rounded-md">Login</button>
    <!-- hover will change background color when clicked -->
    <button class=" bg-blue-500 hover:bg-blue-800 text-white px-4 py-2 rounded">Hover me</button>
    <!-- focus will change background color when focused -->
    <button class="bg-blue-500 focus:bg-blue-800 text-white px-4 py-2 rounded">Focus me</button>
    <!-- active will change background color when active -->
    <button class="bg-blue-500 active:bg-blue-800 text-white px-4 py-2 rounded">Active me</button>
    <!-- disabled will change background color when disabled -->    
    <button class="bg-blue-500 disabled:bg-gray-400 text-white px-4 py-2 rounded" disabled>Disabled me</button>
     <br>
    <a href=" " class="hover:text-blue-400">Hover me</a>
    
</body>
</html>
