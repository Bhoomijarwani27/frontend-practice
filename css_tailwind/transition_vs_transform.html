<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    <!-- Button 1: No transition -->
    <button class="bg-blue-500   m-7  border-2 border-blue-800 text-amber-50 rounded hover:bg-blue-950 " > button 1 </button>
    <!-- Button 2: With transition -->
    <button class="bg-blue-500   m-7  border-2 border-blue-800 text-amber-50 rounded hover:bg-blue-950
     transition duration-1000 " >button 2 </button>
     <!-- Button 3: With opacity change -->
     <button class="bg-blue-500   m-7  border-2 border-blue-800 text-amber-50 rounded hover:opacity-5
     " >button 3 </button>
        <!-- Button 4: With opacity change and transition -->
     <button class="bg-blue-500   m-7  border-2 border-blue-800 text-amber-50 rounded hover:opacity-5
      transition duration-1000" >button 4 </button>
      <!-- Button 5: With rotation -->
      <button class="bg-blue-500   m-7  border-2 border-blue-800 text-amber-50 rounded hover:rotate-45
     " >button 5 </button>
        <!-- Button 6: With rotation and transition -->
        <button class="bg-blue-500   m-7  border-2 border-blue-800 text-amber-50 rounded hover:rotate-180
         transition duration-1000" >button 6 </button>
            <!-- Button 7: With scale change and transition -->
         <button class="bg-blue-500   m-7  border-2 border-blue-800 text-amber-50 rounded hover:scale-50
         transition duration-1000" >button 7 </button>
       <!-- all this function happen with images -->
</body>
</html>
