<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
     <div class="fixed inset-0 bg-gray-500 bg-opacity-50 flex items-center justify-center">
        <div class="bg-white w-[90%] max-w-xl text-left shadow-xl rounded overflow-hidden">
            <div class="p-6">
                <div class="flex items-start gap-4">
                    <img class="w-20 h-20 object-cover rounded" src="https://cdn-icons-png.flaticon.com/512/1828/1828665.png" alt="icon">
                    <div class="flex-1">
                        <h3 class="text-lg font-bold">Deactivate account</h3>
                        <p class="text-gray-600 mt-2">Are you sure you want to deactivate your account? This action cannot be undone.</p>
                    </div>
                </div>
            </div>
        <div class="px-6 py-4 bg-gray-100 flex justify-end gap-2">
            <button class="px-4 py-2 bg-gray-300 text-gray-700 rounded hover:bg-gray-400">Cancel</button>
            <button class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600">Deactivate</button>
        </div>
    </div>
