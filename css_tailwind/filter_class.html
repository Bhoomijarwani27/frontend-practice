<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    <h1 class="blur">Hello, World!</h1>
    <img src="image.jpg"/>
    <!-- make images blurry -->
    <img class="blur" src="image.jpg"/>
    <img class="blur-sm" src="image.jpg"/>
    <img class="blur-md" src="image.jpg"/>
    <img class="blur-lg" src="image.jpg"/>
    <img class="blur-xl" src="image.jpg"/>
    <img class="blur-2xl" src="image.jpg"/>
    <!-- make images brighter -->
    <img class="brightness-20" src="image.jpg"/>
    <img class="brightness-50" src="image.jpg"/>
    <!-- make images more contrasted -->
    <img class="contrast-0" src="image.jpg"/>
    <img class="contrast-50" src="image.jpg"/>
    <!-- make images grayscale -->
    <img class="grayscale" src="image.jpg"/>
    <img class="grayscale-0" src="image.jpg"/>
    <img class="grayscale-50" src="image.jpg"/>
    <!-- make images inverted colour effect happen -->
    <img class="invert" src="image.jpg"/>
    <!-- make images hue-rotated means colour changing  -->
     <img class="hue-rotate-100" src="image.jpg"/>



    
</body>
</html>
