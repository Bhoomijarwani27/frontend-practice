<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    <!-- for background images in this image can repeat -->
    <div class="bg-red-500 size-120 p-3 m-3" style="background-image: url(image.jpg);">hello</div>
     <!-- other ways to set background images in this used of bg-no-repeat help in avoiding repetition -->
    <div class="bg-red-500 size-100 bg-[url('image.jpg')] bg-no-repeat bg-center">hello</div>
        <!-- for gradient background -->
    <div class="gradient bg-gradient-to-t to-blue-500 from-red-500 size-20">hello</div>
     <!-- for shadows -->
     <div class="size-96 m-32 shadow-orange-400 shadow-2xl">hello</div>
     <!-- for inner shadows -->
     <div class="size-96 m-32 shadow-orange-400 shadow-inner">hello</div>
</body>
</html>
